name: 🐛 버그 리포트 (Bug)
description: 오류 및 버그 발생 시 사용합니다.
title: "[BUG] "
labels: ["bug"]
assignees: []

body:
  - type: textarea
    id: description
    attributes:
      label: 발생 현상
      placeholder: |
        어떤 상황에서 어떤 오류가 발생했는지 기술하세요.
        스크린샷 또는 에러 로그가 있으면 첨부하세요.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 절차 (선택)
      placeholder: |
        1. 
        2. 
        3.

  - type: textarea
    id: expected
    attributes:
      label: 예상 결과 / 실제 결과 (선택)
      placeholder: |
        예상 결과: 
        실제 결과: 

  - type: textarea
    id: env
    attributes:
      label: 발생 환경 (선택)
      placeholder: |
        OS: 
        Browser/Tool: 
        Part: (예: Frontend, Backend, AI)

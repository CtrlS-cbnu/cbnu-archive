name: 📝 문서 작업 (Docs)
description: README, 명세서, 위키 등 문서 추가 및 수정 시 사용합니다.
title: "[DOCS] "
labels: ["documentation"]
assignees: []

body:
  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      placeholder: |
        어떤 문서를 어떻게 수정·추가하는지 기술하세요.
        예) .devspec.md — 요구사항 명세 섹션 5.3 내용 보완
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 변경 사유
      placeholder: |
        문서 수정이 필요한 이유를 기술하세요.
        예) 기능 변경으로 인한 명세 불일치, 오탈자 수정, 신규 항목 추가 등
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: 관련 이슈 (선택)
      placeholder: "예: Refs #5"

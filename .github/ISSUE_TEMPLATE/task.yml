name: 📋 작업 (Task)
description: 리팩터링, 환경 설정, 인프라 등 기능·버그 외 작업 등록 시 사용합니다.
title: "[TASK] "
labels: ["task"]
assignees: []

body:
  - type: textarea
    id: description
    attributes:
      label: 작업 내용
      placeholder: |
        작업 목적과 완료 기준을 기술하세요.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 세부 작업 목록 (선택)
      placeholder: |
        - [ ] 작업 1
        - [ ] 작업 2

  - type: textarea
    id: related
    attributes:
      label: 관련 이슈 (선택)
      placeholder: "예: Closes #12, Refs #7"

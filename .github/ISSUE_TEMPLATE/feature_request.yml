name: ✨ 기능 개발 (Feature)
description: 새로운 기능 개발 및 추가 요청 시 사용합니다.
title: "[FEAT] "
labels: ["enhancement"]
assignees: []

body:
  - type: textarea
    id: overview
    attributes:
      label: 기능 개요
      placeholder: |
        추가·개발할 기능의 목적과 범위를 기술하세요.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 세부 작업 목록
      placeholder: |
        - [ ] 작업 1
        - [ ] 작업 2
        - [ ] 작업 3
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: 관련 이슈 (선택)
      placeholder: "예: #1"

  - type: textarea
    id: notes
    attributes:
      label: 참고 사항 (선택)
      placeholder: 디자인 시안, 참고 링크, DB 스키마 변경 사항 등
